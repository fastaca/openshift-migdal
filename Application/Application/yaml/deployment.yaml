kind: Deployment
apiVersion: apps/v1
metadata:
  # Set your lab user name
  name: fastaca-hello-world
spec:
  replicas: 3
  selector:
    matchLabels:
      # Set your lab user name
      app: fastaca-hello-world
  template:
    metadata:
      labels:
        # Set your lab user name
        app: fastaca-hello-world
    spec:
      containers:
        - name: hello-world
          image: 'quay.io/fastaca/imageshai:v2'
          resources: {}
          terminationMessagePath: /dev/termination-log
          ports:
            - containerPort: 8080
              protocol: TCP
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10